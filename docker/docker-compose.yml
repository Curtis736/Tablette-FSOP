services:
  # Backend API SEDI Tablette
  sedi-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: sedi-tablette-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Admin authentication — définir dans docker/.env (ne jamais laisser vide)
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_SERVER=SERVEURERP
      # App DB (SEDI_APP_INDEPENDANTE) + ERP DB (SEDI_ERP)
      - DB_DATABASE=${DB_DATABASE:-SEDI_APP_INDEPENDANTE}
      - DB_ERP_SERVER=${DB_ERP_SERVER:-SERVEURERP}
      - DB_ERP_DATABASE=${DB_ERP_DATABASE:-SEDI_ERP}
      - DB_ERP_USER=${DB_ERP_USER:-QUALITE}
      - DB_ERP_PASSWORD=${DB_ERP_PASSWORD:-QUALITE}
      - DB_ERP_ENCRYPT=${DB_ERP_ENCRYPT:-false}
      - DB_ERP_TRUST_CERT=${DB_ERP_TRUST_CERT:-true}
      - DB_USER=${DB_USER:-QUALITE}
      - DB_PASSWORD=${DB_PASSWORD:-QUALITE}
      - DB_ENCRYPT=${DB_ENCRYPT:-false}
      - DB_TRUST_CERT=${DB_TRUST_CERT:-true}
      - FRONTEND_URL=http://localhost
      - API_TIMEOUT=30000
      - API_RETRY_ATTEMPTS=3
      - CACHE_ENABLED=true
      - CACHE_TTL=300000
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}

      # Factorial IN/OUT sync (polling 17h+30min)
      # IMPORTANT: définis au minimum FACTORIAL_API_TOKEN dans `docker/.env`.
      - ENABLE_FACTORIAL_AUTOCLOSE=${ENABLE_FACTORIAL_AUTOCLOSE:-true}
      - FACTORIAL_API_BASE_URL=${FACTORIAL_API_BASE_URL:-https://api.factorialhr.com}
      - FACTORIAL_API_TOKEN=${FACTORIAL_API_TOKEN}
      - FACTORIAL_OPEN_SHIFTS_PATH=${FACTORIAL_OPEN_SHIFTS_PATH:-/resources/attendance/open_shifts}
      - FACTORIAL_SHIFTS_PATH=${FACTORIAL_SHIFTS_PATH:-/resources/attendance/shifts}
      - FACTORIAL_SHIFTS_LOOKBACK_DAYS=${FACTORIAL_SHIFTS_LOOKBACK_DAYS:-2}
      - FACTORIAL_RAW_PAYLOAD_RETENTION_DAYS=${FACTORIAL_RAW_PAYLOAD_RETENTION_DAYS:-30}
      # Timeout & scheduler
      - FACTORIAL_API_TIMEOUT_MS=${FACTORIAL_API_TIMEOUT_MS:-10000}
      - FACTORIAL_CHECK_START_HOUR=${FACTORIAL_CHECK_START_HOUR:-17}
      - FACTORIAL_CHECK_INTERVAL_MINUTES=${FACTORIAL_CHECK_INTERVAL_MINUTES:-30}
      # SILOG EDI_JOB : ne pas déclencher depuis le backend (tâche planifiée sur SVC_SILOG)
      - SILOG_REMOTE_MODE=${SILOG_REMOTE_MODE:-scheduled}
      # Validation auto des temps terminés → StatutTraitement='O' (V_REMONTE_TEMPS)
      - ENABLE_AUTO_VALIDATE_TEMPS=${ENABLE_AUTO_VALIDATE_TEMPS:-true}
      - AUTO_VALIDATE_TEMPS_HOUR=${AUTO_VALIDATE_TEMPS_HOUR:-20}
      # FSOP (tracabilité / templates)
      - TRACEABILITY_DIR=${TRACEABILITY_DIR:-/mnt/services}
      - FSOP_TEMPLATES_DIR=${FSOP_TEMPLATES_DIR:-}
      - FSOP_TEMPLATES_XLSX_PATH=${FSOP_TEMPLATES_XLSX_PATH:-}
    ports:
      - "3001:3001"
    extra_hosts:
      - "SERVEURERP:192.168.1.14"
      - "serveurerp:192.168.1.14"
    networks:
      - sedi-network
    restart: unless-stopped
    # Le volume nommé est créé root:root par défaut; le backend tourne en user `node`.
    # On fixe l'ownership au démarrage pour éviter EACCES sur /app/logs/maintenance.log.
    user: "0"
    command:
      - sh
      - -lc
      - >
        mkdir -p /app/logs &&
        chown -R node:node /app/logs &&
        exec su node -s /bin/sh -c "node server.js"
    volumes:
      - sedi-logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      # Montage traçabilité (hôte) -> conteneur
      # Par défaut sur ta VM : /mnt/partage_fsop est un CIFS vers 192.168.1.9
      - ${SERVICES_HOST_PATH:-/mnt/partage_fsop}:${SERVICES_CONTAINER_PATH:-/mnt/services}:rw
      # Montage templates (hôte) -> conteneur
      # Sur ta VM : /mnt/templates est un CIFS vers 192.168.1.9 (dossier Services/Qualite/...)
      - ${TEMPLATES_HOST_PATH:-/mnt/templates}:${TEMPLATES_CONTAINER_PATH:-/mnt/templates}:ro
    labels:
      - "com.sedi.service=backend"
      - "com.sedi.version=2.2"
      - "com.sedi.description=SEDI Tablette Backend API with Pause Management"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Nginx SEDI Tablette
  sedi-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: sedi-tablette-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      sedi-backend:
        condition: service_healthy
    networks:
      - sedi-network
    restart: unless-stopped
    volumes:
      - sedi-logs:/var/log/nginx
      - /etc/localtime:/etc/localtime:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    labels:
      - "com.sedi.service=frontend"
      - "com.sedi.version=2.2"
      - "com.sedi.description=SEDI Tablette Frontend with Pause Management"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Prometheus - Collecte & stockage des métriques
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    container_name: sedi-prometheus
    ports:
      - "9091:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - sedi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Grafana - Visualisation des métriques
  grafana:
    image: grafana/grafana:latest
    container_name: sedi-grafana
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-grafana-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://192.168.1.26:8080/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-change-me}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    networks:
      - sedi-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sedi-network:
    name: sedi-tablette-network
    driver: bridge
    labels:
      - "com.sedi.network=main"

volumes:
  sedi-logs:
    name: sedi-tablette-logs
    driver: local
    labels:
      - "com.sedi.volume=logs"
      - "com.sedi.description=Logs centralisés pour SEDI Tablette"

  prometheus_data:
    driver: local

  grafana_data:
    driver: local
