events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Redirection HTTP -> HTTPS (sauf page install-cert accessible sans HTTPS)
    server {
        listen 80;
        server_name _;

        # Page d'installation du certificat accessible en HTTP
        location = /install-cert {
            return 301 /install-cert.html;
        }
        location = /install-cert.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
        }
        location /ssl/SEDI-ATI-CA.crt {
            alias /etc/nginx/ssl/ca.crt;
            default_type 'application/x-x509-ca-cert';
            add_header Content-Disposition 'attachment; filename="SEDI-ATI-CA.crt"';
            add_header Cache-Control 'no-cache';
        }

        # Tout le reste -> HTTPS
        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    # Serveur HTTPS
    server {
        listen 443 ssl;
        server_name sedi-tablette.local localhost;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/nginx/ssl/fsop.crt;
        ssl_certificate_key /etc/nginx/ssl/fsop.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Sécurité
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Gestion des fichiers statiques optimisée pour tablettes
        location / {
            try_files $uri $uri/ /index.html;

            # Headers spécifiques pour tablettes
            add_header X-UA-Compatible "IE=edge" always;
            add_header X-Tablet-Optimized "true" always;

            # Cache pour les fichiers statiques
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Access-Control-Allow-Origin "*";

                location ~* \.(woff|woff2)$ {
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }
            }

            # Optimisation pour les fichiers HTML/CSS/JS
            location ~* \.(html|css|js)$ {
                expires 1h;
                add_header Cache-Control "public, must-revalidate";
            }

            # Configuration pour index.html
            location = /index.html {
                expires 0;
                add_header Cache-Control "no-cache, must-revalidate";
            }
        }

        # Proxy pour l'API backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://sedi-tablette-backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Headers pour tablettes
            proxy_set_header X-Device-Type $http_x_device_type;
            proxy_set_header X-Touch-Device "true";

            # Timeouts optimisés pour tablettes
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # Buffer pour améliorer les performances
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Page d'installation du certificat CA (accessible en HTTP et HTTPS)
        location = /install-cert {
            return 301 /install-cert.html;
        }
        location = /install-cert.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
        }

        # Téléchargement du certificat CA
        location /ssl/SEDI-ATI-CA.crt {
            alias /etc/nginx/ssl/ca.crt;
            default_type 'application/x-x509-ca-cert';
            add_header Content-Disposition 'attachment; filename="SEDI-ATI-CA.crt"';
            add_header Cache-Control 'no-cache';
        }

        # Endpoint de santé
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Gestion des erreurs
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
