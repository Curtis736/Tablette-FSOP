events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # HTTP -> HTTPS (except local health endpoint)
    server {
        listen 80 default_server;
        server_name fsop.sedi-ati.com _;

        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name fsop.sedi-ati.com;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/letsencrypt/live/fsop.sedi-ati.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fsop.sedi-ati.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Référence de release (importée par App.js) : toujours à jour avec le bundle
        location = /version.js {
            try_files $uri =404;
            expires epoch;
        }

        # Point d'entrée JS : pas de cache long (évite app figée). Uniquement `expires` ici pour ne pas casser
        # l'héritage des add_header du bloc server (HSTS, X-Frame-Options, etc.).
        location = /index.js {
            try_files $uri =404;
            expires epoch;
        }

        # Assets sous /assets/ : cache long (bump ?v= dans index.html à chaque release si besoin)
        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
        }

        # Autres statiques : cache modéré, sans immutable (évite clients bloqués sur un vieux bundle)
        location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
            try_files $uri =404;
            expires 1d;
        }

        # Coquille SPA : toujours revalider (try_files → redirection interne vers cette URI)
        location = /index.html {
            try_files $uri =404;
            expires epoch;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # Ne jamais stocker les réponses API dans un cache mandataire Nginx (si proxy_cache activé ailleurs)
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            proxy_pass http://sedi-tablette-backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }
    }
}
